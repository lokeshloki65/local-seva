<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | ServaLocal</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f8fafc;
      color: #334155;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
      max-width: 400px;
      width: 100%;
      border: 1px solid #e2e8f0;
    }
    .logo-container {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #ff5722, #ff7a45);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: white;
      font-weight: 800;
      font-size: 28px;
    }
    h2 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 10px;
      color: #0f172a;
    }
    p {
      font-size: 13px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 25px;
    }
    .btn {
      background: #ff5722;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(255, 87, 34, 0.2);
      transition: all 0.2s;
    }
    .btn:hover {
      background: #e64a19;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-container">S</div>
    <h2>Connection Interrupted</h2>
    <p>ServaLocal requires an active internet connection to track workers in real-time or complete slot bookings. Please check your cellular data or Wi-Fi settings.</p>
    <button class="btn" onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
